components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: refresh_token
      description: Authentication via `refresh_token` cookie (obtained from login). The `access_token` cookie is also used but managed automatically.
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
