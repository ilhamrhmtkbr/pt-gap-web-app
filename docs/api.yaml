openapi: 3.0.0
info:
  title: Backend API PT GAP
  version: 1.0.0
  description: API documentation generated from a HAR file. All endpoints (except authentication) require a valid `refresh_token` cookie obtained from login.
servers:
  - url: https://ora-uncheckable-ameer.ngrok-free.dev/backend-api-pt-gap/v1
    description: Production server (ngrok)
  - url: http://localhost/backend-api-pt-gap/v1
    description: Local development server
security:
  - cookieAuth: []
paths:
  /auth/login:
    post:
      summary: Login with email and password
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: admin@gmail.com
                password:
                  type: string
                  format: password
                  example: password
      responses:
        '200':
          description: Successful login, sets `access_token` and `refresh_token` cookies
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Contains `access_token` (expires in 1 hour) and `refresh_token` (expires in 7 days)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Login successfully
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid credentials
  /auth/login-with-google:
    post:
      summary: Login with Google credential
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - credential
              properties:
                credential:
                  type: string
                  example: "109469925459273044718"
      responses:
        '200':
          description: Successful login (no example in HAR)
        '401':
          description: Invalid Google Token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid Google Token
  /auth/register:
    post:
      summary: Register a new user
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - password
                - password_confirmation
                - email
              properties:
                name:
                  type: string
                  example: Sarun
                password:
                  type: string
                  format: password
                password_confirmation:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: request-auth.register-success
  /users:
    get:
      summary: List users
      tags:
        - Users
      parameters:
        - name: sort_direction
          in: query
          schema:
            type: string
            enum: [asc, desc]
          description: Sort direction
        - name: page
          in: query
          schema:
            type: integer
          description: Page number
        - name: per_page
          in: query
          schema:
            type: integer
          description: Items per page
        - name: sort_by
          in: query
          schema:
            type: string
          description: Field to sort by
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  links:
                    $ref: '#/components/schemas/PaginationLinks'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
  /users/{id}:
    get:
      summary: Get a user by ID
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Request data successfully retrieved.
                  data:
                    $ref: '#/components/schemas/User'
    patch:
      summary: Update a user
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                image:
                  type: string
                  format: binary
                  description: User profile image
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Request data successfully updated.
                  data:
                    $ref: '#/components/schemas/User'
    delete:
      summary: Delete a user
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: request-data.destroy-success
  /users/transactions:
