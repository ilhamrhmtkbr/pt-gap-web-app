      responses:
        '401':
          description: Unauthorized (missing token)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Token not provided
        '200':
          description: Transaction deleted (example not present, assumed)
  /users/transactions/midtrans:
    post:
      summary: Update transaction with Midtrans payment notification
      tags:
        - Transactions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Midtrans payment notification payload
              additionalProperties: true
              example:
                va_numbers:
                  - va_number: "968620080676797180"
                    bank: bri
                transaction_time: "2026-03-17 00:25:54"
                transaction_status: settlement
                transaction_id: "32136f32-9207-4224-8f0a-259c3b66d9e5"
                status_message: "midtrans payment notification"
                status_code: "200"
                signature_key: "5271d1cb214142bd799283b9c88cb68d797b1423ac7810c62472bfb63992f84f873096d6ade5a44803ed1dde30d691d5da3f003bccb8d776daeb02393021aeb3"
                settlement_time: "2026-03-17 00:26:27"
                payment_type: bank_transfer
                order_id: "22c178cf-b2f9-4cfe-abaa-109f4741a820"
                gross_amount: "199998.00"
                fraud_status: accept
                expiry_time: "2026-03-18 00:25:54"
                customer_details:
                  full_name: "Ilham A"
                  email: "ilhamrahmat652@gmail.com"
                  address: "Indonesia"
                custom_field1: "ilhamrhmtkbr-coding"
                currency: IDR
      responses:
        '200':
          description: Transaction updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Request data successfully updated.
