              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Request data successfully retrieved.
                  data:
                    type: object
                    properties:
                      filters:
                        type: array
                        items: {}
                      data:
                        type: array
                        items:
